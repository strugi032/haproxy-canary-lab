global
    log stdout format raw local0
    # Enable Runtime API on port 9999, accessible from localhost
    stats socket ipv4@0.0.0.0:9999 level admin
    # Sensible defaults for a local lab
    maxconn 1024

defaults
    log global
    mode http
    option httplog
    option dontlognull
    
    # Timeouts
    timeout connect 5s      # Maximum time to wait for a connection to a backend server
    timeout client  30s     # Maximum inactivity time on the client side
    timeout server  30s     # Maximum inactivity time on the server side
    timeout http-request 5s # Maximum time to wait for a complete HTTP request
    timeout queue 5s        # Maximum time to wait in the queue for a connection slot

frontend http_front
    bind *:8080
    default_backend web_backend

backend web_backend
    balance roundrobin
    
    # Active health checks against /healthz, expected status 200
    option httpchk GET /healthz
    http-check expect status 200

    # Response headers to identify the selected server
    http-response set-header X-Backend-Server %s

    # Servers with initial weights
    # check: enables active health checks
    # inter 2s: interval between checks
    # fall 2: 2 failed checks to mark offline
    # rise 2: 2 successful checks to mark online
    # slowstart 5s: gradually increase traffic over 5s after returning
    server web-v1-a web-v1-a:80 check inter 2s fall 2 rise 2 slowstart 5s weight 45
    server web-v1-b web-v1-b:80 check inter 2s fall 2 rise 2 slowstart 5s weight 45
    server web-v2-canary web-v2-canary:80 check inter 2s fall 2 rise 2 slowstart 5s weight 10

# Statistics page
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
